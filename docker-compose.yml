version: '3.9'

services:
  nestapp:
    container_name: nestapp
    image: iman/nestapp:1.0.0
    build: .
    ports:
      - 3000:3000
    env_file:
      - .env.production.local
    depends_on:
      - db
  db:
    container_name: db
    image: postgres:18-alpine
    ports:
      - 5432:5432
    environment:
      - POSTGRES_USER=${PG_USER}
      - POSTGRES_PASSWORD=${PG_PASSWORD}
      - POSTGRES_DB=${PG_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: {}
